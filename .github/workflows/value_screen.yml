name: Monthly Value Screen

on:
  schedule:
    # 1st of every month at 14:00 UTC (10am ET)
    - cron: '0 14 1 * *'
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  screen:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run value screen
        run: python scheduler/value_screen.py
